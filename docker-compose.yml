version: "3.8"

services:
  # 1. MySQL 데이터베이스
  db:
    image: mysql:8.0
    container_name: project_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: side_project
      TZ: Asia/Seoul
    ports:
      - "3307:3306" # 내부망 통신용
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 2. Redis 캐시
  redis:
    image: redis:alpine
    container_name: project_redis
    restart: always

  # 3. 백엔드 (Node.js)
  backend:
    build: ./backend
    container_name: project_backend
    restart: always
    # ports는 Nginx가 중계하므로 외부에 노출할 필요 없음 (보안 강화)
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
      - ./backend/chromaupload:/app/chromaupload

  # 4. 프론트엔드 (React/Vite)
  frontend:
    build: ./frontend
    container_name: project_frontend
    restart: always
    env_file:
      - ./.env # VITE_API_URL이 담긴 파일
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # 5. ★ Nginx 게이트웨이 추가 ★
  nginx:
    image: nginx:alpine
    container_name: project_nginx
    restart: always
    ports:
      - "80:80" # NCP ACG에서 열어준 80포트
      - "443:443" # 나중에 SSL 적용 시 사용
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
